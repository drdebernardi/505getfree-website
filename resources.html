<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources · 505 GET FREE</title>
  <meta name="description" content="Statewide directory of shelters, legal aid, counseling, and survivor services across New Mexico.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="css/spa.css">

  <style>
    body{ background: var(--veil); }

    /* Hero — more compact for this page */
    .res-hero{
      padding: 88px 48px 56px;
      text-align: center;
      background:
        radial-gradient(700px 400px at 80% 0%, rgba(143,196,222,.25), transparent 60%),
        linear-gradient(180deg, var(--veil) 0%, var(--porcelain) 100%);
    }
    .res-hero .eyebrow{ justify-content:center; }
    .res-hero .eyebrow::before{ display:none; }
    .res-hero h1{
      font-family: var(--serif);
      font-size: clamp(44px, 5.5vw, 76px);
      line-height: 1;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin: 20px 0 18px;
    }
    .res-hero h1 em{ font-style: italic; color: var(--navy); }
    .res-hero > p{
      font-size: 17px; line-height: 1.7;
      max-width: 620px; margin: 0 auto;
      color: var(--ink-muted);
    }

    /* Sticky filter bar */
    .filter-bar{
      position: sticky;
      top: 72px;
      z-index: 40;
      background: rgba(250,250,247,.92);
      backdrop-filter: saturate(140%) blur(16px);
      border-top: 1px solid rgba(29,42,138,.08);
      border-bottom: 1px solid rgba(29,42,138,.08);
      padding: 18px 40px;
    }
    .filter-inner{
      max-width: 1440px;
      margin: 0 auto;
    }

    /* City tabs */
    .city-tabs{
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(29,42,138,.08);
      margin-bottom: 14px;
      scrollbar-width: thin;
    }
    .city-tabs::-webkit-scrollbar{ height: 4px; }
    .city-tabs::-webkit-scrollbar-thumb{ background: rgba(29,42,138,.2); border-radius: 2px; }
    .city-tab{
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      color: var(--ink-muted);
      background: transparent;
      border: none;
      padding: 10px 18px;
      border-radius: 100px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s var(--ease);
      letter-spacing: 0.005em;
    }
    .city-tab:hover{ color: var(--navy); background: rgba(29,42,138,.05); }
    .city-tab.active{
      background: var(--navy);
      color: #fff;
      font-weight: 500;
    }

    /* Search + category row */
    .filter-controls{
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap{
      position: relative;
      flex: 0 0 300px;
    }
    .search-wrap svg{
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-muted);
    }
    .search-input{
      width: 100%;
      padding: 11px 14px 11px 42px;
      font-family: var(--sans);
      font-size: 14px;
      border: 1px solid rgba(29,42,138,.15);
      border-radius: 100px;
      background: var(--paper);
      color: var(--ink);
      outline: none;
      transition: all .2s var(--ease);
    }
    .search-input:focus{
      border-color: var(--navy);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(29,42,138,.08);
    }

    /* Category filters — scrollable row on desktop */
    .category-filters{
      display: flex;
      gap: 8px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .category-filters::-webkit-scrollbar{ display: none; }

    .cat-chip{
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid rgba(29,42,138,.2);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s var(--ease);
    }
    .cat-chip:hover{ border-color: var(--navy); color: var(--navy); }
    .cat-chip.active{ background: var(--navy); color: #fff; border-color: var(--navy); }

    .clear-filters{
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .clear-filters:hover{ color: var(--navy); }

    /* Mobile filter button + dropdown */
    .mobile-filter-btn{
      display: none;
      align-items: center;
      gap: 8px;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: 100px;
      border: 1px solid rgba(29,42,138,.2);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      flex-shrink: 0;
      transition: all .2s var(--ease);
    }
    .mobile-filter-btn:hover{ border-color: var(--navy); color: var(--navy); }
    .mobile-filter-btn.has-active{ background: var(--navy); color: #fff; border-color: var(--navy); }
    .mobile-filter-badge{
      background: #fff;
      color: var(--navy);
      font-size: 10px;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .mobile-filter-btn:not(.has-active) .mobile-filter-badge{ display: none; }

    /* Filter dropdown panel (mobile) */
    .filter-dropdown{
      display: none;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--paper);
      border-bottom: 1px solid rgba(29,42,138,.1);
      box-shadow: 0 16px 40px -16px rgba(14,26,102,.2);
      padding: 20px;
      z-index: 50;
    }
    .filter-dropdown.open{ display: block; }
    .filter-dropdown-chips{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-dropdown-footer{
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid rgba(29,42,138,.08);
    }
    .filter-dropdown-count{
      font-size: 12px;
      color: var(--ink-muted);
    }

    @media (max-width: 760px){
      .filter-controls{ gap: 10px; }
      .category-filters{ display: none; }
      .clear-filters{ display: none; }
      .mobile-filter-btn{ display: inline-flex; }
    }

    /* Layout: list + map */
    .res-layout{
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      min-height: calc(100vh - 200px);
    }
    .res-list-panel{
      overflow-y: auto;
      max-height: calc(100vh - 180px);
      padding: 32px 32px 48px;
      background: var(--veil);
    }
    .res-list-panel::-webkit-scrollbar{ width: 6px; }
    .res-list-panel::-webkit-scrollbar-thumb{ background: rgba(29,42,138,.2); border-radius: 3px; }

    .results-meta{
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(29,42,138,.1);
      margin-bottom: 22px;
    }
    .results-count{
      font-family: var(--serif);
      font-style: italic;
      font-size: 19px;
      color: var(--ink);
      font-weight: 400;
    }
    .results-count strong{ color: var(--navy); font-weight: 500; font-style: normal; font-family: var(--sans); }

    /* Resource card */
    .resource-card{
      background: var(--paper);
      border: 1px solid rgba(29,42,138,.08);
      border-radius: var(--radius);
      padding: 26px 26px 22px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: all .25s var(--ease);
      position: relative;
      overflow: hidden;
    }
    .resource-card::before{
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--sky);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform .3s var(--ease);
    }
    .resource-card:hover{
      border-color: rgba(29,42,138,.2);
      transform: translateX(2px);
    }
    .resource-card:hover::before,
    .resource-card.active-card::before{ transform: scaleY(1); }
    .resource-card.active-card{
      border-color: var(--navy);
      background: #fff;
      box-shadow: 0 20px 40px -28px rgba(14,26,102,.3);
    }
    .resource-card-top{
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 10px;
    }
    .resource-card h3{
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      line-height: 1.2;
      color: var(--ink);
      letter-spacing: -0.005em;
      flex: 1;
    }
    .resource-city-badge{
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--navy);
      padding: 5px 11px;
      background: var(--veil);
      border-radius: 100px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .resource-cats{
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .resource-cat-tag{
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      padding: 4px 10px;
      background: var(--porcelain);
      border-radius: 100px;
    }
    .resource-desc{
      font-size: 14px;
      line-height: 1.65;
      color: var(--ink-text);
      margin-bottom: 14px;
    }
    .resource-contact{
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px solid rgba(29,42,138,.08);
    }
    .resource-contact a{
      font-size: 13px;
      color: var(--navy);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .resource-contact a:hover{ color: var(--ink); }

    .no-results{
      text-align: center;
      padding: 80px 24px;
      color: var(--ink-muted);
    }
    .no-results p{
      font-family: var(--serif);
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .no-results a{
      color: var(--navy);
      border-bottom: 1px solid rgba(29,42,138,.35);
    }

    /* Map panel */
    .map-panel{
      position: sticky;
      top: 180px;
      height: calc(100vh - 200px);
    }
    #map{
      width: 100%;
      height: 100%;
      background: var(--porcelain);
    }

    /* Leaflet overrides */
    .leaflet-container{
      font-family: var(--sans) !important;
    }
    .leaflet-popup-content-wrapper{
      border-radius: var(--radius) !important;
      box-shadow: 0 30px 60px -24px rgba(14,26,102,.3) !important;
    }
    .leaflet-popup-content{
      margin: 18px 20px !important;
      font-family: var(--sans);
    }
    .map-popup h4{
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .map-popup-cats{
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-bottom: 8px;
    }
    .map-popup-cat{
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--navy);
      padding: 2px 8px;
      background: var(--veil);
      border-radius: 100px;
    }
    .map-popup p{
      font-size: 13px; line-height: 1.55; color: var(--ink-text);
      margin-bottom: 10px;
    }
    .map-popup a{
      font-size: 12px; color: var(--navy);
      border-bottom: 1px solid rgba(29,42,138,.3);
    }

    @media (max-width: 1000px){
      .res-layout{
        grid-template-columns: 1fr;
      }
      .map-panel{
        position: relative;
        top: 0;
        height: 400px;
        order: -1;
      }
      .res-list-panel{
        max-height: none;
      }
      .filter-bar{ top: 64px; padding: 14px 20px; }
      .search-wrap{ flex: 1; min-width: 200px; }
    }
  </style>
</head>
<body>

  <div id="chrome-top"></div>

  <!-- Hero -->
  <section class="res-hero">
    <p class="eyebrow">Resource Directory</p>
    <h1>Find help <em>near you.</em></h1>
    <p>A statewide directory of shelters, legal aid, counseling, and survivor services. Filter by location or service type — then call, text, or visit the provider that fits.</p>
  </section>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-inner">
      <div class="city-tabs" id="city-tabs"></div>
      <div class="filter-controls">
        <div class="search-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" id="search-input" class="search-input" placeholder="Search by name or service…" autocomplete="off">
        </div>
        <!-- Desktop: scrollable chip row -->
        <div class="category-filters" id="category-filters"></div>
        <button class="clear-filters" id="clear-filters" onclick="clearFilters()">Clear all</button>
        <!-- Mobile: filter button + dropdown -->
        <button class="mobile-filter-btn" id="mobile-filter-btn" onclick="toggleFilterDropdown()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
          Filter
          <span class="mobile-filter-badge" id="mobile-filter-badge">0</span>
        </button>
      </div>
      <!-- Mobile dropdown panel -->
      <div class="filter-dropdown" id="filter-dropdown">
        <div class="filter-dropdown-chips" id="filter-dropdown-chips"></div>
        <div class="filter-dropdown-footer">
          <span class="filter-dropdown-count" id="filter-dropdown-count">All categories</span>
          <button class="clear-filters" onclick="clearFilters()">Clear all</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Layout -->
  <div class="res-layout">
    <div class="res-list-panel">
      <div class="results-meta">
        <span class="results-count" id="results-count">Loading…</span>
      </div>
      <div id="resources-list"></div>
    </div>
    <div class="map-panel">
      <div id="map"></div>
    </div>
  </div>

  <div id="chrome-bottom"></div>

  <script src="js/resources.js"></script>
  <script src="js/chrome.js"></script>
  <script>
    let currentCity = 'all';
    let activeCategories = new Set();
    let searchQuery = '';
    let map, markers = [];

    function readUrlParams(){
      const params = new URLSearchParams(window.location.search);
      const city = params.get('city') || params.get('region') || 'all';
      if (CITIES.find(c => c.id === city)) currentCity = city;
    }

    function buildCityTabs(){
      const c = document.getElementById('city-tabs');
      c.innerHTML = CITIES.map(city => `
        <button class="city-tab ${city.id === currentCity ? 'active' : ''}" onclick="selectCity('${city.id}')">${city.label}</button>
      `).join('');
    }

    function buildCategoryChips(){
      const chips = ALL_CATEGORIES.map(cat => `
        <button class="cat-chip ${activeCategories.has(cat.id) ? 'active' : ''}" onclick="toggleCategory('${cat.id}')">${cat.label}</button>
      `).join('');
      document.getElementById('category-filters').innerHTML = chips;
      document.getElementById('filter-dropdown-chips').innerHTML = chips;

      // Update mobile button state
      const count = activeCategories.size;
      const btn = document.getElementById('mobile-filter-btn');
      const badge = document.getElementById('mobile-filter-badge');
      const countEl = document.getElementById('filter-dropdown-count');
      badge.textContent = count;
      btn.classList.toggle('has-active', count > 0);
      countEl.textContent = count > 0 ? `${count} categor${count === 1 ? 'y' : 'ies'} selected` : 'All categories';
    }

    function toggleFilterDropdown(){
      const dd = document.getElementById('filter-dropdown');
      dd.classList.toggle('open');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e){
      const dd = document.getElementById('filter-dropdown');
      const btn = document.getElementById('mobile-filter-btn');
      if (dd && dd.classList.contains('open') && !dd.contains(e.target) && !btn.contains(e.target)){
        dd.classList.remove('open');
      }
    });

    function getFiltered(){
      return RESOURCES.filter(r => {
        const cityMatch = currentCity === 'all' || r.city === currentCity;
        const catMatch = activeCategories.size === 0 || r.categories.some(c => activeCategories.has(c));
        const q = searchQuery.toLowerCase().trim();
        const sMatch = !q ||
          r.name.toLowerCase().includes(q) ||
          r.description.toLowerCase().includes(q) ||
          r.categories.some(c => c.replace('-', ' ').includes(q)) ||
          r.address.toLowerCase().includes(q);
        return cityMatch && catMatch && sMatch;
      });
    }

    function renderCards(resources){
      const c = document.getElementById('resources-list');
      const meta = document.getElementById('results-count');
      meta.innerHTML = `Showing <strong>${resources.length}</strong> resource${resources.length !== 1 ? 's' : ''}`;

      if (resources.length === 0){
        c.innerHTML = `<div class="no-results"><p>No resources found.</p><small>Try adjusting filters or <a href="#" onclick="clearFilters();return false;">clear all filters</a>.</small></div>`;
        return;
      }

      c.innerHTML = resources.map((r, idx) => {
        const cats = r.categories
          .map(cid => ALL_CATEGORIES.find(c => c.id === cid)?.label || cid)
          .map(l => `<span class="resource-cat-tag">${l}</span>`)
          .join('');
        const cityLabel = CITIES.find(c => c.id === r.city)?.label || r.city;
        const contact = [
          r.phone ? `<a href="tel:${r.phone.replace(/\D/g,'')}" onclick="event.stopPropagation()">☎ ${r.phone}</a>` : '',
          r.website ? `<a href="${r.website}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ Website</a>` : '',
          r.address && !['National','International','Federal (National)'].includes(r.address)
            ? `<a href="https://maps.google.com/?q=${encodeURIComponent(r.address)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">◎ ${r.address}</a>`
            : ''
        ].filter(Boolean).join('');
        return `
          <div class="resource-card" id="card-${idx}" onclick="focusResource(${idx})">
            <div class="resource-card-top">
              <h3>${r.name}</h3>
              <span class="resource-city-badge">${cityLabel}</span>
            </div>
            <div class="resource-cats">${cats}</div>
            <p class="resource-desc">${r.description}</p>
            ${contact ? `<div class="resource-contact">${contact}</div>` : ''}
          </div>`;
      }).join('');
    }

    function initMap(){
      const center = CITY_CENTERS['all'];
      map = L.map('map', { center: [center.lat, center.lng], zoom: center.zoom, zoomControl: true });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);
    }

    function updateMap(resources){
      markers.forEach(m => map.removeLayer(m.marker));
      markers = [];
      resources.forEach((r, idx) => {
        if (!r.lat || !r.lng) return;
        const catLabels = r.categories
          .map(cid => ALL_CATEGORIES.find(c => c.id === cid)?.label || cid)
          .map(l => `<span class="map-popup-cat">${l}</span>`).join('');
        const icon = L.divIcon({
          className: '',
          html: `<div style="width:16px;height:16px;background:#1D2A8A;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.35);"></div>`,
          iconSize: [16,16], iconAnchor: [8,8]
        });
        const marker = L.marker([r.lat, r.lng], { icon }).addTo(map).bindPopup(`
          <div class="map-popup">
            <h4>${r.name}</h4>
            <div class="map-popup-cats">${catLabels}</div>
            <p>${r.description}</p>
            ${r.phone ? `<a href="tel:${r.phone.replace(/\D/g,'')}">${r.phone}</a> ` : ''}
            ${r.website ? `<a href="${r.website}" target="_blank">Website →</a>` : ''}
          </div>`, { maxWidth: 280 });
        marker.on('click', () => highlightCard(idx));
        markers.push({ marker, idx });
      });
      const center = CITY_CENTERS[currentCity] || CITY_CENTERS['all'];
      map.flyTo([center.lat, center.lng], center.zoom, { duration: 0.8 });
    }

    function highlightCard(idx){
      document.querySelectorAll('.resource-card').forEach(c => c.classList.remove('active-card'));
      const card = document.getElementById(`card-${idx}`);
      if (card){
        card.classList.add('active-card');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function focusResource(idx){
      document.querySelectorAll('.resource-card').forEach(c => c.classList.remove('active-card'));
      const card = document.getElementById(`card-${idx}`);
      if (card) card.classList.add('active-card');
      const m = markers.find(x => x.idx === idx);
      if (m){
        m.marker.openPopup();
        map.panTo(m.marker.getLatLng(), { animate: true });
      }
    }

    function render(){
      const filtered = getFiltered();
      renderCards(filtered);
      updateMap(filtered);
      buildCityTabs();
      buildCategoryChips();
    }

    function selectCity(id){
      currentCity = id;
      activeCategories.clear();
      searchQuery = '';
      document.getElementById('search-input').value = '';
      const url = new URL(window.location);
      if (id === 'all'){ url.searchParams.delete('city'); url.searchParams.delete('region'); }
      else url.searchParams.set('city', id);
      history.replaceState(null, '', url);
      render();
    }

    function toggleCategory(id){
      if (activeCategories.has(id)) activeCategories.delete(id);
      else activeCategories.add(id);
      render();
    }

    function clearFilters(){
      activeCategories.clear();
      searchQuery = '';
      document.getElementById('search-input').value = '';
      render();
    }

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = e.target.value;
        render();
      }, 250);
    });

    readUrlParams();
    initMap();
    render();
  </script>
</body>
</html>
